[[items]]
title = "Variational Image Denoising and Segmentation"
subtitle = "Mentored Research, Tongji University"
date = "2024–2025"
content = """
Built quadratic and total-variation regularized models for image restoration and segmentation. Derived Euler-Lagrange conditions and implemented gradient-based and primal-dual solvers with reproducible experiments.
"""
tags = ["Applied Mathematics", "Optimization", "Image Processing", "Python"]

[[items]]
title = "Airport Taxi Decision Modeling"
subtitle = "Independent Research"
content = """
Modeled taxi-driver dispatch choices at Shanghai Hongqiao Airport using analytic hierarchy methods, multi-server FCFS queues, unit-time revenue models, MATLAB simulation, and sensitivity analysis.
"""
tags = ["Queueing Theory", "Mathematical Modeling", "MATLAB", "Simulation"]
