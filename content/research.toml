title = "Autonomous Systems and Humanoid Motion"
subtitle = "State Key Laboratory of AI Unmanned Systems, Tongji University"
date = "2025"
content = """
Processed optical motion-capture trajectories, aligned joint logs, and retargeted human motion to simulated humanoid skeletons. Integrated reference motions into NVIDIA Isaac Sim and validated them through replay.
"""
